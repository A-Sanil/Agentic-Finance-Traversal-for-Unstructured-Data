services:
  - type: web
    name: agentic-traversal-api
    runtime: python
    runtimeVersion: 3.9
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: python -m uvicorn --app-dir src quant_agent.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.6
      - key: TRADING_MARKET_SCAN_CRON
        value: "*/5 * * * *"
      - key: TRADING_CRYPTO_SCAN_CRON
        value: "*/15 * * * *"
      - key: TRADING_MARKET_POSITION_SIZE_PCT
        value: "0.12"
      - key: TRADING_MARKET_MAX_POSITION_SIZE_PCT
        value: "0.35"
      - key: TRADING_MARKET_MIN_CONFIDENCE
        value: "0.62"
      - key: TRADING_CRYPTO_POSITION_SIZE_PCT
        value: "0.02"
      - key: TRADING_CRYPTO_MAX_POSITION_SIZE_PCT
        value: "0.05"
      - key: TRADING_CRYPTO_MIN_CONFIDENCE
        value: "0.88"
      - key: TRADING_ENABLE_CRYPTO
        value: "true"
      - key: TRADING_CRYPTO_WATCHLIST
        value: "BTC-USD,ETH-USD,SOL-USD,DOGE-USD,XRP-USD"
      - key: APCA_API_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: APCA_API_KEY_ID
        sync: false
      - key: APCA_API_SECRET_KEY
        sync: false
